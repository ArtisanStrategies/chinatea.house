name: Build and Deploy

on:
  push:
    branches: [main]
  schedule:
    # Run daily at 6am UTC for drip publishing
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      full_rebuild:
        description: 'Force full rebuild (not incremental)'
        required: false
        default: 'false'
        type: boolean
      publish_all:
        description: 'Publish all pages (not drip)'
        required: false
        default: 'false'
        type: boolean

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Restore database cache
        uses: actions/cache@v4
        with:
          path: data/canonical/tea.db
          key: tea-db-${{ hashFiles('execution/data/schema.sql') }}-${{ hashFiles('execution/data/seed.py') }}-${{ hashFiles('execution/data/tea_data.py') }}-${{ hashFiles('execution/data/comparisons.py') }}-${{ hashFiles('data/canonical/exports/*.json') }}

      - name: Restore output cache
        uses: actions/cache@v4
        with:
          path: output
          key: output-${{ github.sha }}
          restore-keys: |
            output-

      - name: Initialize database (if needed)
        run: |
          if [ ! -f data/canonical/tea.db ]; then
            python -m execution.cli init
            python -m execution.cli seed
          fi

      - name: Generate comparison pairs
        run: python -m execution.cli comparisons

      - name: Validate data
        run: python -m execution.cli validate

      - name: Build site
        run: |
          if [ "${{ inputs.full_rebuild }}" = "true" ]; then
            python -m execution.cli build --full
          else
            python -m execution.cli build --incremental
          fi

      - name: Show build stats
        run: python -m execution.cli stats

      - name: Publish pages
        run: |
          if [ "${{ inputs.publish_all }}" = "true" ]; then
            python -m execution.cli publish --all
          else
            python -m execution.cli publish --drip
          fi

      - name: Verify crawl files
        run: |
          test -f output/index.html
          test -f output/robots.txt
          test -f output/sitemap.xml

      - name: Create IndexNow key file
        run: python execution/promotion/indexnow.py --create-key output

      - name: Setup Node.js for Wrangler
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wrangler
        run: npm install -g wrangler

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          wrangler pages deploy output/ \
            --project-name=chinatea-house \
            --branch=main

      - name: Submit sitemap to IndexNow
        run: python execution/promotion/indexnow.py --submit output/sitemap.xml
        continue-on-error: true

      - name: Save database cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: data/canonical/tea.db
          key: tea-db-${{ hashFiles('execution/data/schema.sql') }}-${{ hashFiles('execution/data/seed.py') }}-${{ hashFiles('execution/data/tea_data.py') }}-${{ hashFiles('execution/data/comparisons.py') }}-${{ hashFiles('data/canonical/exports/*.json') }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: build-logs
          path: |
            logs/
            output/*.log
          retention-days: 7

  # Notify on failure
  notify:
    runs-on: ubuntu-latest
    needs: build-deploy
    if: failure()
    steps:
      - name: Send failure notification
        run: |
          echo "Build failed! Check the workflow logs."
          # Add webhook notification here if needed

  # Weekly full rebuild to catch any drift
  weekly-full-rebuild:
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 6 * * 0'  # Sundays only
    steps:
      - name: Trigger full rebuild
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'build-deploy.yml',
              ref: 'main',
              inputs: {
                full_rebuild: 'true'
              }
            })
